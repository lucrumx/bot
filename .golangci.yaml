run:
  timeout: 3m
  modules-download-mode: readonly

linters:
  enable:
    - goimports
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - revive

issues:
  exclude-use-default: false
  exclude-dirs:
    - internal/testmocks
  exclude-files:
    - ".*_mock\\.go$"

linters-settings:
  goimports:
    local-prefixes: github.com/lucrumx/bot
