all: false
force-file-write: true
formatter: goimports
generate: true
include-auto-generated: false
log-level: info
require-template-schema-exists: true
template: testify
template-schema: "{{.Template}}.schema.json"

dir: '{{ .InterfaceDirRelative | trimPrefix "internal/" | replaceAll "/" "_" | printf "internal/testmocks/%s" }}'
filename: "{{.InterfaceName}}_mock.go"
structname: "{{.Mock}}{{.InterfaceName}}"
pkgname: '{{ .InterfaceDirRelative | trimPrefix "internal/" | replaceAll "/" "_" | replaceAll "-" "_" | base }}'

packages:
    github.com/lucrumx/bot:
        config:
            all: false
            recursive: true
